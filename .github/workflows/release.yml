name: Release

on:
  push:
    tags:
      - 'v*'
      - 'bridge-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run package:windows
      - run: node --test test/package-integrity.test.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Afaq Attendance Bridge ${{ github.ref_name }} — Hikvision ISAPI auth fix
          body: |
            ## Fixes
            - Hikvision Digest Auth `authMode: auto` (also `digest` / `basic`)
            - POST AcsEvent polling (`eventsMethod: POST`) with capability probing
            - `test-device` command with DEVICE_* diagnosis codes
            - Device HTTP 401 no longer treated as a service crash; sync loop retries
            - Stronger `validate-config --deep` (TCP + ISAPI auth + events)
            - DS-K1A802AEF-B config defaults

            ## config.json (device)
            ```json
            "authMode": "auto",
            "eventsMethod": "POST",
            "centralApiBaseUrl": "https://api.tofan.dev/v1"
            ```

            ## Diagnose
            ```
            AfaqAttendanceBridge.exe test-device
            AfaqAttendanceBridge.exe validate-config --deep
            ```

            Download **AfaqAttendanceBridge-win-x64.zip** only — do NOT use Source code (zip)
          files: |
            dist-packages/AfaqAttendanceBridge-win-x64.zip
            dist-packages/SHA256SUMS.txt
          generate_release_notes: true
