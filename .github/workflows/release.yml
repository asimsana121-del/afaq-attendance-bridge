name: Release

on:
  push:
    tags:
      - 'v*'
      - 'bridge-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run package:windows
      - run: node --test test/package-integrity.test.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Afaq Attendance Bridge ${{ github.ref_name }} — Service startup diagnostics fix
          body: |
            ## Fixes
            - Fixes install-service.bat false SUCCESS when service fails to start
            - Adds config.json preflight checks before installing service
            - Adds validate-config CLI command
            - Ensures WinSW starts AfaqAttendanceBridge.exe run with correct working directory
            - Captures service logs under logs/
            - Improves run-once/status diagnostics
            - Adds package integrity checks for runtime/service XML

            ## Install order
            1. Extract to C:\AfaqAttendanceBridge (flat root)
            2. Copy config.example.json to config.json and edit
            3. Run run-once.bat first
            4. Run install-service.bat as Administrator
            5. Confirm service is RUNNING

            Download **AfaqAttendanceBridge-win-x64.zip** only — do NOT use Source code (zip)
          files: |
            dist-packages/AfaqAttendanceBridge-win-x64.zip
            dist-packages/SHA256SUMS.txt
          generate_release_notes: true
