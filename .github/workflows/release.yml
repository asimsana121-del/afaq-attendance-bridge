name: Release

on:
  push:
    tags:
      - 'v*'
      - 'bridge-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run package:windows
      - run: node --test test/package-integrity.test.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Afaq Attendance Bridge ${{ github.ref_name }} — WinSW service startup fix
          body: |
            ## Fixes
            - Fixes WinSW service startup **1064** when console mode works
            - Adds `service-run.bat` (same `AfaqAttendanceBridge.exe run` as run-once, app-root cwd)
            - WinSW `%BASE%` corrected: service runs from app root via `cmd.exe /c service-run.bat`
            - Immediate service boot logs (`service-boot.log`, `service.stdout.log`)
            - Top-level crash logging (uncaughtException / unhandledRejection)
            - No monorepo redeploy required

            ## Install
            1. Confirm `run-once.bat` works
            2. `uninstall-service.bat` (if old service present)
            3. `install-service.bat` as Administrator

            Download **AfaqAttendanceBridge-win-x64.zip** only — do NOT use Source code (zip)
          files: |
            dist-packages/AfaqAttendanceBridge-win-x64.zip
            dist-packages/SHA256SUMS.txt
          generate_release_notes: true
