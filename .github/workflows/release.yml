name: Release

on:
  push:
    tags:
      - 'v*'
      - 'bridge-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run package:windows
      - run: node --test test/package-integrity.test.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Afaq Attendance Bridge ${{ github.ref_name }} — CSRF / API URL fix
          body: |
            ## Fixes
            - Clear error when bridge hits browser-protected (CSRF) endpoints
            - `validate-config --deep` probes activate endpoint before run
            - Rejects `/api/bff` and missing `/v1` in `centralApiBaseUrl`
            - Documents correct direct API base URL for machine-to-machine auth
            - `credentials: omit` on all central API requests

            ## Requires
            - Backend hotfix deployed (bridge CSRF exemption on API) — Portainer `BUILD_COMMIT` ≥ tracker_update `56aab24`
            - `config.json` field `centralApiBaseUrl` must be `https://api.<domain>/v1` (not tenant web/BFF URL)

            ## Install order
            1. Extract to C:\AfaqAttendanceBridge (flat root)
            2. Copy config.example.json to config.json and edit `centralApiBaseUrl`
            3. Run run-once.bat first (runs validate-config --deep)
            4. Run install-service.bat as Administrator
            5. Confirm service is RUNNING

            Download **AfaqAttendanceBridge-win-x64.zip** only — do NOT use Source code (zip)
          files: |
            dist-packages/AfaqAttendanceBridge-win-x64.zip
            dist-packages/SHA256SUMS.txt
          generate_release_notes: true
