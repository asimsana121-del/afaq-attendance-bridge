name: Release

on:
  push:
    tags:
      - 'v*'
      - 'bridge-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run package:windows
      - run: node --test test/package-integrity.test.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Afaq Attendance Bridge ${{ github.ref_name }} — api.tofan.dev URL fix
          body: |
            ## Fixes
            - `centralApiBaseUrl` example: `https://api.tofan.dev/v1` (tofan.dev production)
            - Warns against tenant hosts (`tfn.tofan.dev/v1`) and `/api/bff`
            - CSRF-aware errors and `validate-config --deep` (from v0.1.3)

            ## Requires
            - Monorepo: `api.tofan.dev` OpenResty + Portainer `API_PUBLISH_PORT=3002`
            - API CSRF bridge exemption deployed (`BUILD_COMMIT` ≥ `56aab24`)

            ## config.json
            ```json
            "centralApiBaseUrl": "https://api.tofan.dev/v1"
            ```

            Download **AfaqAttendanceBridge-win-x64.zip** only — do NOT use Source code (zip)
          files: |
            dist-packages/AfaqAttendanceBridge-win-x64.zip
            dist-packages/SHA256SUMS.txt
          generate_release_notes: true
